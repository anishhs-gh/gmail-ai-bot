steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--service-account=${_SERVICE_ACCOUNT}'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GMAIL_USER_EMAIL=${_GMAIL_USER_EMAIL},PUBSUB_TOPIC=${_PUBSUB_TOPIC},PUBSUB_AUDIENCE=${_PUBSUB_AUDIENCE}'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=60'
      - '--concurrency=80'
      - '--no-allow-unauthenticated'

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: gmail-ai-bot
  _AR_REPO: gmail-ai-bot
  _SERVICE_ACCOUNT: gmail-ai-bot-sa@gmail-ai-bot-490018.iam.gserviceaccount.com
  _GMAIL_USER_EMAIL: you@yourdomain.com
  _PUBSUB_TOPIC: projects/${PROJECT_ID}/topics/gmail-notifications
  _PUBSUB_AUDIENCE: https://gmail-ai-bot-vqcfpb6dsq-uc.a.run.app/webhook

options:
  logging: CLOUD_LOGGING_ONLY
